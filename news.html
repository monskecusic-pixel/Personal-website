<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 资讯 & 个人文章 - AI Trainer Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">PORTFOLIO</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="news.html" class="active">AI 资讯</a></li>
                <li><a href="tools.html">工具栈</a></li>
                <li><a href="career.html">求职意向</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <div class="floating-bar">
        <div class="close-btn">&times;</div>
        <img src="images/wechat-qr-placeholder.png" alt="WeChat QR Code" style="background: #fff;">
        <p>加微信获取<br>AI 求职专属资料包</p>
    </div>

    <main class="container">
        <section class="page-header">
            <h1>AI 视野 | 我的思考</h1>
            <p>最新 AI 行业动态与深度洞察</p>
        </section>

        <!-- Modal for adding articles -->
        <div id="addArticleModal" class="modal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
            <div style="background:#1e1e1e; padding:30px; border-radius:10px; width:90%; max-width:500px; border:1px solid var(--accent-color);">
                <h3 style="color:var(--accent-color); margin-bottom:20px;">添加新文章</h3>
                <input type="text" id="newArticleTitle" placeholder="文章标题" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:1px solid #555;">
                <input type="text" id="newArticleSource" placeholder="来源/作者" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:1px solid #555;">
                <input type="date" id="newArticleDate" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:1px solid #555;">
                <textarea id="newArticleSummary" placeholder="摘要简介" rows="4" style="width:100%; padding:10px; margin-bottom:20px; background:#333; color:#fff; border:1px solid #555;"></textarea>
                <input type="text" id="newArticleLink" placeholder="原文链接 (可选)" style="width:100%; padding:10px; margin-bottom:20px; background:#333; color:#fff; border:1px solid #555;">
                <div style="text-align:right;">
                    <button onclick="document.getElementById('addArticleModal').style.display='none'" style="padding:8px 20px; margin-right:10px; background:transparent; border:1px solid #666; color:#aaa; cursor:pointer;">取消</button>
                    <button onclick="saveNewArticle()" style="padding:8px 20px; background:var(--accent-color); border:none; color:#000; cursor:pointer; font-weight:bold;">保存</button>
                </div>
            </div>
        </div>

        <section class="news-section">
            <h2>行业精选</h2>
            <div class="news-grid" id="industryNewsGrid">
                <!-- Static items removed, loaded by JS -->
            </div>
        </section>

        <section class="personal-articles">
            <h2>我的思考</h2>
            <div class="news-grid" id="personalArticlesGrid">
                <!-- Static items removed, loaded by JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AI Trainer Portfolio. All Rights Reserved.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
