<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具栈 & 工作流 - AI Trainer Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">PORTFOLIO</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="news.html">AI 资讯</a></li>
                <li><a href="tools.html" class="active">工具栈</a></li>
                <li><a href="career.html">求职意向</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <div class="floating-bar">
        <div class="close-btn">&times;</div>
        <img src="images/wechat-qr-placeholder.png" alt="WeChat QR Code" style="background: #fff;">
        <p>加微信获取<br>AI 求职专属资料包</p>
    </div>

    <main class="container">
        <section class="page-header">
            <h1>AI 工具栈 | 我的工作流</h1>
            <p>高效生产力工具与自动化流程分享</p>
        </section>

        <!-- Modal for adding tools -->
        <div id="addToolModal" class="modal" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
            <div style="background:#1e1e1e; padding:30px; border-radius:10px; width:90%; max-width:500px; border:1px solid var(--accent-color);">
                <h3 style="color:var(--accent-color); margin-bottom:20px;">添加新工具</h3>
                <input type="text" id="newToolName" placeholder="工具名称" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:1px solid #555;">
                <textarea id="newToolDesc" placeholder="工具描述" rows="3" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:#fff; border:1px solid #555;"></textarea>
                <input type="text" id="newToolLink" placeholder="工具链接" style="width:100%; padding:10px; margin-bottom:20px; background:#333; color:#fff; border:1px solid #555;">
                <div style="text-align:right;">
                    <button onclick="document.getElementById('addToolModal').style.display='none'" style="padding:8px 20px; margin-right:10px; background:transparent; border:1px solid #666; color:#aaa; cursor:pointer;">取消</button>
                    <button onclick="saveNewTool()" style="padding:8px 20px; background:var(--accent-color); border:none; color:#000; cursor:pointer; font-weight:bold;">保存</button>
                </div>
            </div>
        </div>

        <section class="tools-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>常用 AI 工具</h2>
                <button onclick="document.getElementById('addToolModal').style.display='flex'" class="btn-small" style="background:transparent; cursor:pointer;">+ 添加工具</button>
            </div>
            <div class="tools-list" id="toolsList">
                <!-- Static items removed, loaded by JS -->
            </div>
        </section>

        <section class="workflow-section" style="margin-top: 50px;">
            <h2>工作流分享</h2>
            <div class="news-grid" id="workflowGrid">
                <!-- Static items removed, loaded by JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AI Trainer Portfolio. All Rights Reserved.</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
